<style>
    /* Main page */
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: #ffffff;
        background-color: #000000;
        line-height: 1.6;
    }

    /* Centres the content */
    .container {
        width: 90%;
        max-width: 1000px;
        margin: auto;
    }

    /* Header */
    header {
        background-color: #000000;
        padding: 20px 0;
        border-bottom: 1px solid #333333;
    }

    /* Navigation */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
    }

    nav a {
        margin-left: 15px;
        color: #ffffff;
        text-decoration: none;
    }

    nav a:hover {
        color: #cccccc;
    }

    /* Main buttons */
    .button {
        display: inline-block;
        padding: 12px 20px;
        background-color: #ffffff;
        color: #000000;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
    }

    .button:hover {
        background-color: #dddddd;
    }

    /* Hero section */
    .hero {
        padding: 80px 0;
        text-align: center;
        background-color: #000000;
    }

    .hero h1 {
        margin-bottom: 15px;
        font-size: 42px;
    }

    /* General sections */
    section {
        padding: 50px 0;
    }

    /* Alternate section background */
    #services,
    #login {
        background-color: #111111;
    }

    h2 {
        margin-top: 0;
    }

    /* Cards */
    .services {
        display: grid;
        gap: 20px;
    }

    .card {
        padding: 25px;
        background-color: #111111;
        border: 1px solid #333333;
        border-radius: 8px;
    }

    /* Student login section */
    .student-login {
        text-align: center;
    }

    /* Footer */
    footer {
        padding: 25px 0;
        text-align: center;
        background-color: #000000;
        color: #ffffff;
        border-top: 1px solid #333333;
    }

    /* Desktop cards */
    @media (min-width: 700px) {
        .services {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    /* Mobile layout */
    @media (max-width: 699px) {
        nav {
            flex-direction: column;
            text-align: center;
        }

        nav a {
            display: inline-block;
            margin: 5px;
        }

        .hero h1 {
            font-size: 32px;
        }
    }
</style>
